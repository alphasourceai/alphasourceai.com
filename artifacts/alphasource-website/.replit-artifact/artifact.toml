kind = "web"
previewPath = "/"
title = "AlphaSource AI Website"
version = "1.0.0"
id = "artifacts/alphasource-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25932

[services.development]
run = "pnpm --filter @workspace/alphasource-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alphasource-website", "run", "build" ]
publicDir = "artifacts/alphasource-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25932"
BASE_PATH = "/"
